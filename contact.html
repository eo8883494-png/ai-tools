<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ｜はたらくAI研究室</title>
<meta name="description" content="はたらくAI研究室へのお問い合わせ方法について。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700&display=swap" rel="stylesheet">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7413732460126636" crossorigin="anonymous"></script>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
:root{
  --paper:#F7F6F2; --ink:#1F2933; --ai:#2B4C7E; --shu:#C73E3A; --rule:#D9D5CC; --card:#FFFFFF; --muted:#6B7280;
  --mincho:"Shippori Mincho","Hiragino Mincho ProN","Yu Mincho",serif;
  --sans:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Noto Sans JP",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.8}
a{color:var(--ai)}
.wrap{max-width:680px;margin:0 auto;padding:0 20px 64px}
.site{display:flex;align-items:center;gap:10px;padding:20px 0 8px;font-size:13px;letter-spacing:.06em;color:var(--muted)}
.hanko{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:var(--shu);color:#FBF6EE;font-family:var(--mincho);font-weight:700;font-size:14px;border-radius:4px;transform:rotate(-4deg)}
h1{font-family:var(--mincho);font-weight:700;font-size:clamp(28px,6.5vw,36px);margin:12px 0 24px}
.lead{color:var(--muted);font-size:15px;margin-bottom:28px}
.card{background:var(--card);border:1px solid var(--rule);border-radius:10px;padding:22px 20px;margin-bottom:16px}
.card h2{font-family:var(--mincho);font-weight:600;font-size:17px;margin-bottom:8px}
.card p{font-size:14px;color:var(--muted)}
.card a{font-size:15px;font-weight:500}
footer{margin-top:40px;padding-top:18px;border-top:1px solid var(--rule);font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
<header class="site"><span class="hanko" aria-hidden="true">研</span><span>はたらくAI研究室</span></header>
<main>
<h1>お問い合わせ</h1>
<p class="lead">ツールの不具合報告、計算結果に関するご指摘、その他ご質問は、以下のいずれかからご連絡ください。</p>

<div class="card">
  <h2>note</h2>
  <p>記事へのコメント、またはメッセージ機能からご連絡ください。</p>
  <a href="https://note.com/ainative_" target="_blank" rel="noopener">https://note.com/ainative_</a>
</div>

<div class="card">
  <h2>BOOTH</h2>
  <p>商品ページのメッセージ機能からもご連絡いただけます。</p>
  <a href="https://ainative.booth.pm" target="_blank" rel="noopener">https://ainative.booth.pm</a>
</div>

<p style="font-size:13px;color:var(--muted);margin-top:20px">通常、ご返信までに数日いただく場合があります。あらかじめご了承ください。</p>

</main>
<footer><p>© 2026 はたらくAI研究室</p></footer>
</div>
</body>
</html>
